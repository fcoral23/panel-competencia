<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Monitoreo IAs</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .panel {
      flex: 1;
      position: relative;
      border: 1px solid #222;
      overflow: hidden;
    }
    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 0, 0, 0.25);
      pointer-events: none;
    }
    .info {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
    }
    .prompt-container {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      height: 38%; /* AJUSTA AQUÍ altura zona prompts */
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column-reverse;
      justify-content: flex-start;
      align-items: stretch;
      gap: 10px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 75%, rgba(0,0,0,0.35) 92%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 75%, rgba(0,0,0,0.35) 92%, rgba(0,0,0,0) 100%);
    }

    .prompt-container::-webkit-scrollbar { display: none; }

    .prompt {
      background: rgba(255,255,255,0.55);
      color: black;
      padding: 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.35;
      max-height: calc(1.35em * 5); /* AJUSTA AQUÍ max líneas */
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
      width: 100%;
      box-sizing: border-box;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
      scrollbar-width: thin;
    }

    .prompt::-webkit-scrollbar {
      width: 6px;
    }

    .status {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0,0,0,0.8);
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: bold;
      font-size: 20px;
    }
  </style>
</head>
<body>
<script>
let CONFIG = [];

let events = [];

function weightedThinkingDuration(prompt = '') {
  const ratio = Math.min(prompt.length / 300, 1);
  return Math.floor(5000 + ratio * 25000);
}

function getStatus(event, allowedAI) {
  if (!event) return 'SLEEPING';

  const diff = Date.now() - new Date(event.Timestamp).getTime();

  if (diff > 60000) return 'SLEEPING';
  if (event['Tipo de evento'] === 'visit' && event.Sitio === allowedAI) return 'AWAKE';

  if (event['Tipo de evento'] === 'prompt_sent') {
    const thinkingMs = weightedThinkingDuration(event.Prompt || '');
    return diff <= thinkingMs ? 'THINKING' : 'ANSWERING';
  }

  return 'SLEEPING';
}

async function fetchSheets() {
  try {
        const eventsRes = await fetch('https://opensheet.elk.sh/1X4wUq7yaeTql1bJ4iVTVbYemTthNgXH6Bz6BCK2RFe0/Eventos');
    const configRes = await fetch('https://opensheet.elk.sh/1X4wUq7yaeTql1bJ4iVTVbYemTthNgXH6Bz6BCK2RFe0/config');


    const newEvents = await eventsRes.json();
    const rawConfig = await configRes.json();

    CONFIG = rawConfig.map(row => ({
      equipo: row['Equipo'].toLowerCase(),
      iaPermitida: row['IA Permitida']
    }));

    const firstLoad = events.length === 0;
    events = newEvents;

    if (firstLoad) {
      render();
    }
  } catch (e) {
    console.error(e);
  }
}

function render() {
  document.body.innerHTML = '';

  CONFIG.forEach(team => {
    const teamEvents = events
      .filter(e => (e.Equipo || '').toLowerCase() === team.equipo)
      .sort((a,b) => new Date(b.Timestamp) - new Date(a.Timestamp));

    const latest = teamEvents[0];
    const corruption = teamEvents.some(e => e.Sitio !== team.iaPermitida);
    const status = getStatus(latest, team.iaPermitida);
    const image = `assets/${status.toLowerCase()}${team.equipo.replace('equipo ', '')}.png`;

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.dataset.team = team.equipo;
    panel.dataset.allowed = team.iaPermitida;

    panel.innerHTML = `
      <img src="${image}">
      ${corruption ? '<div class="overlay"></div>' : ''}
      <div class="info"><strong>${team.equipo}</strong> - ${status}<br>${team.iaPermitida}</div>
      <div class="prompt-container">${latest && latest['Tipo de evento'] === 'prompt_sent' && latest.Prompt ? `<div class="prompt">${latest.Prompt}</div>` : ''}</div>
      
    `;

    document.body.appendChild(panel);
  });
}

function updateStatusesOnly() {
  document.querySelectorAll('.panel').forEach(panel => {
    const team = panel.dataset.team;
    const allowed = panel.dataset.allowed;

    const teamEvents = events
      .filter(e => (e.Equipo || '').toLowerCase() === team)
      .sort((a,b) => new Date(b.Timestamp) - new Date(a.Timestamp));

    const latest = teamEvents[0];
    const status = getStatus(latest, allowed);
    const image = `assets/${status.toLowerCase()}${team.replace('equipo ', '')}.png`;
    const corruption = teamEvents.some(e => e.Sitio !== allowed);

    const img = panel.querySelector('img');
    const statusDiv = panel.querySelector('.status');
    const promptContainer = panel.querySelector('.prompt-container');
    const promptDiv = panel.querySelector('.prompt');

    if (img && img.dataset.current !== image) {
      img.src = image;
      img.dataset.current = image;
    }
    if (statusDiv) statusDiv.textContent = status;

    const newPrompt = latest && latest['Tipo de evento'] === 'prompt_sent' ? latest.Prompt || '' : '';

    if (newPrompt) {
      if (!promptDiv) {
        const div = document.createElement('div');
        div.className = 'prompt';
        div.textContent = newPrompt;
        promptContainer.prepend(div);
      } else if (promptDiv.textContent !== newPrompt) {
        const div = document.createElement('div');
        div.className = 'prompt';
        div.textContent = newPrompt;
        promptContainer.prepend(div);
      }

      while (promptContainer.children.length > 20) {
        promptContainer.removeChild(promptContainer.lastElementChild);
      }
    }

    if (corruption && !panel.querySelector('.overlay')) {
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      panel.appendChild(overlay);
    }
  });
}

fetchSheets();
setInterval(fetchSheets, 15000); /* AJUSTA AQUÍ polling ms */
setInterval(updateStatusesOnly, 1000);
</script>
</body>
</html>
