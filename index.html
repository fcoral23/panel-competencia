<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Monitoreo IAs</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .panel {
      flex: 1;
      position: relative;
      border: 1px solid #222;
      overflow: hidden;
    }
    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 0, 0, 0.25);
      pointer-events: none;
    }
    .info {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
    }
    .prompt {
      position: absolute;
      top: 90px;
      left: 16px;
      right: 16px;
      background: white;
      color: black;
      padding: 14px;
      border-radius: 18px;
      font-size: 14px;
      max-height: 180px;
      overflow: auto;
    }
    .status {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0,0,0,0.8);
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: bold;
      font-size: 20px;
    }
  </style>
</head>
<body>
<script>
let CONFIG = [];

let events = [];

function weightedThinkingDuration(prompt = '') {
  const ratio = Math.min(prompt.length / 300, 1);
  return Math.floor(5000 + ratio * 25000);
}

function getStatus(event, allowedAI) {
  if (!event) return 'SLEEPING';

  const diff = Date.now() - new Date(event.Timestamp).getTime();

  if (diff > 60000) return 'SLEEPING';
  if (event['Tipo de evento'] === 'visit' && event.Sitio === allowedAI) return 'AWAKE';

  if (event['Tipo de evento'] === 'prompt_sent') {
    const thinkingMs = weightedThinkingDuration(event.Prompt || '');
    return diff <= thinkingMs ? 'THINKING' : 'ANSWERING';
  }

  return 'SLEEPING';
}

async function fetchSheets() {
  try {
    const eventsRes = await fetch('https://docs.google.com/spreadsheets/d/1X4wUq7yaeTql1bJ4iVTVbYemTthNgXH6Bz6BCK2RFe0/edit?gid=1832744232#gid=1832744232/Eventos');
    const configRes = await fetch('https://docs.google.com/spreadsheets/d/1X4wUq7yaeTql1bJ4iVTVbYemTthNgXH6Bz6BCK2RFe0/edit?gid=1832744232#gid=1832744232/config');

    events = await eventsRes.json();
    const rawConfig = await configRes.json();

    CONFIG = rawConfig.map(row => ({
      equipo: row['Equipo'].toLowerCase(),
      iaPermitida: row['IA Permitida']
    }));

    render();
  } catch (e) {
    console.error(e);
  }
}

function render() {
  document.body.innerHTML = '';

  CONFIG.forEach(team => {
    const teamEvents = events
      .filter(e => e.Equipo === team.equipo)
      .sort((a,b) => new Date(b.Timestamp) - new Date(a.Timestamp));

    const latest = teamEvents[0];
    const corruption = teamEvents.some(e => e.Sitio !== team.iaPermitida);
    const status = getStatus(latest, team.iaPermitida);
    const image = `assets/${status.toLowerCase()}${team.equipo.replace('equipo ', '')}.png`;

    const panel = document.createElement('div');
    panel.className = 'panel';

    panel.innerHTML = `
      <img src="${image}">
      ${corruption ? '<div class="overlay"></div>' : ''}
      <div class="info">
        <strong>${team.equipo}</strong><br>
        ${team.iaPermitida}
      </div>
      ${latest && latest['Tipo de evento'] === 'prompt_sent' && latest.Prompt ? `<div class="prompt">${latest.Prompt}</div>` : ''}
      <div class="status">${status}</div>
    `;

    document.body.appendChild(panel);
  });
}

fetchSheets();
setInterval(fetchSheets, 15000);
setInterval(render, 1000);
</script>
</body>
</html>
